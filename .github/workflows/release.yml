name: Release

# Nothing runs on a normal push/merge. The whole pipeline fires only when a
# version tag is pushed, e.g.:
#   git tag v1.0.0 && git push origin v1.0.0
# (workflow_dispatch is allowed for a manual build+test, which skips the release.)
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # required to create the GitHub Release

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore RSS_II_RGB.slnx

      - name: Build
        run: dotnet build RSS_II_RGB.slnx -c Release --no-restore

      - name: Test
        run: dotnet test RSS_II_RGB.slnx -c Release --no-build

  release:
    needs: build-test                              # only release if build+test passed
    if: startsWith(github.ref, 'refs/tags/')       # tag pushes only, not manual runs
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish (Native AOT, win-x64)
        run: dotnet publish src/RSS_II_RGB.App -r win-x64 -c Release -o publish

      - name: Package
        shell: pwsh
        run: Compress-Archive -Path publish/* -DestinationPath "RSS_II_RGB-${{ github.ref_name }}-win-x64.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: RSS_II_RGB-*-win-x64.zip
          generate_release_notes: true
