name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]
  workflow_dispatch:

jobs:
  build-test:
    # The App/Windows projects target net10.0-windows, so the whole solution
    # needs a Windows runner.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore RSS_II_RGB.slnx

      - name: Build
        run: dotnet build RSS_II_RGB.slnx -c Release --no-restore

      - name: Test
        run: dotnet test RSS_II_RGB.slnx -c Release --no-build
